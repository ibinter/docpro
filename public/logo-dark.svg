<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110" width="520" height="110">
  <defs>
    <linearGradient id="docGD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5"/>
      <stop offset="100%" style="stop-color:#1E88E5"/>
    </linearGradient>
    <linearGradient id="tealGD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#00ACC1"/>
    </linearGradient>
    <linearGradient id="goldGD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE082"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
    <filter id="glowD">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#42A5F5" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fond sombre -->
  <rect width="520" height="110" fill="#0A0F1E" rx="12"/>

  <!-- ═══ ICÔNE ═══ -->
  <g filter="url(#glowD)">
    <path d="M18,10 L62,10 L78,26 L78,98 L18,98 Z" fill="url(#docGD)" opacity="0.9"/>
    <path d="M62,10 L62,26 L78,26 Z" fill="#0D1B2A" opacity="0.7"/>
    <rect x="18" y="10" width="7" height="88" rx="3" fill="url(#tealGD)"/>
    <rect x="32" y="38" width="33" height="3.5" rx="1.75" fill="white" opacity="0.9"/>
    <rect x="32" y="47" width="25" height="3.5" rx="1.75" fill="white" opacity="0.7"/>
    <rect x="32" y="56" width="29" height="3.5" rx="1.75" fill="white" opacity="0.7"/>
    <rect x="32" y="65" width="20" height="3.5" rx="1.75" fill="white" opacity="0.55"/>
    <rect x="32" y="74" width="27" height="3.5" rx="1.75" fill="white" opacity="0.55"/>
  </g>

  <!-- Spark IA -->
  <g transform="translate(70, 16)">
    <path d="M0,-14 C0,-6 6,0 14,0 C6,0 0,6 0,14 C0,6 -6,0 -14,0 C-6,0 0,-6 0,-14 Z" fill="url(#goldGD)"/>
    <circle cx="0" cy="0" r="3.5" fill="white"/>
  </g>

  <!-- ═══ WORDMARK (fond sombre) ═══ -->
  <text x="100" y="58" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="46" fill="white" letter-spacing="-1">IBIG</text>
  <text x="230" y="58" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="46" fill="#64B5F6" letter-spacing="-1"> Doc</text>
  <rect x="356" y="18" width="82" height="46" rx="8" fill="url(#tealGD)" opacity="0.9"/>
  <text x="365" y="55" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="38" fill="#0A0F1E" letter-spacing="0">Pro</text>

  <!-- Tagline -->
  <rect x="100" y="68" width="340" height="1" rx="0.5" fill="#FFFFFF" opacity="0.1"/>
  <text x="100" y="82" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="13" fill="#90A4AE" letter-spacing="0.5">Vos documents professionnels, générés en secondes</text>
  <text x="100" y="98" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="11.5" fill="#00E5FF" letter-spacing="0.3">docpro.ibigsoft.com</text>
