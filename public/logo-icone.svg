<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="docG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D2B4E"/>
    </linearGradient>
    <linearGradient id="tealG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ACC1"/>
      <stop offset="100%" style="stop-color:#00838F"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="1" dy="2" stdDeviation="4" flood-color="#0D2B4E" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Corps du document -->
  <g filter="url(#sh)">
    <path d="M16,6 L68,6 L84,22 L84,94 L16,94 Z" fill="url(#docG)"/>
    <!-- Coin replié -->
    <path d="M68,6 L68,22 L84,22 Z" fill="#0A1F3A" opacity="0.5"/>
    <path d="M68,6 L68,22 L84,22 Z" fill="#42A5F5" opacity="0.35"/>
    <!-- Bande teal -->
    <rect x="16" y="6" width="8" height="88" rx="3" fill="url(#tealG)"/>
    <!-- Lignes -->
    <rect x="32" y="38" width="38" height="4" rx="2" fill="white" opacity="0.85"/>
    <rect x="32" y="49" width="30" height="4" rx="2" fill="white" opacity="0.65"/>
    <rect x="32" y="60" width="34" height="4" rx="2" fill="white" opacity="0.65"/>
    <rect x="32" y="71" width="24" height="4" rx="2" fill="white" opacity="0.5"/>
  </g>

  <!-- Spark IA -->
  <g transform="translate(76, 17)">
    <path d="M0,-17 C0,-7 7,0 17,0 C7,0 0,7 0,17 C0,7 -7,0 -17,0 C-7,0 0,-7 0,-17 Z" fill="url(#goldG)"/>
    <circle cx="0" cy="0" r="4" fill="#FFFDE7"/>
  </g>
</svg>
