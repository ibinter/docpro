<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D2B4E"/>
    </linearGradient>
    <linearGradient id="tealC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ACC1"/>
      <stop offset="100%" style="stop-color:#00838F"/>
    </linearGradient>
    <linearGradient id="goldC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#D4A017"/>
    </linearGradient>
    <filter id="shC">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0D2B4E" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fond carré arrondi -->
  <rect width="200" height="200" rx="28" fill="url(#bgC)"/>
  <rect x="0" y="0" width="14" height="200" rx="0" fill="url(#tealC)" rx="14"/>
  <rect x="0" y="0" width="200" height="14" rx="14" fill="url(#tealC)" opacity="0.4"/>

  <!-- Document icône centré -->
  <g filter="url(#shC)" transform="translate(44, 22)">
    <!-- Corps document -->
    <path d="M0,0 L76,0 L100,24 L100,128 L0,128 Z" rx="4" fill="white" opacity="0.12"/>
    <!-- Coin -->
    <path d="M76,0 L76,24 L100,24 Z" fill="white" opacity="0.08"/>
    <!-- Lignes de texte -->
    <rect x="14" y="40" width="60" height="5" rx="2.5" fill="white" opacity="0.85"/>
    <rect x="14" y="53" width="46" height="5" rx="2.5" fill="white" opacity="0.65"/>
    <rect x="14" y="66" width="52" height="5" rx="2.5" fill="white" opacity="0.65"/>
    <rect x="14" y="79" width="36" height="5" rx="2.5" fill="white" opacity="0.5"/>
    <rect x="14" y="92" width="48" height="5" rx="2.5" fill="white" opacity="0.5"/>
  </g>

  <!-- Spark IA (grande) -->
  <g transform="translate(148, 32)">
    <path d="M0,-20 C0,-9 9,0 20,0 C9,0 0,9 0,20 C0,9 -9,0 -20,0 C-9,0 0,-9 0,-20 Z" fill="url(#goldC)"/>
    <circle cx="0" cy="0" r="5" fill="#FFFDE7"/>
  </g>

  <!-- Texte IBIG DocPro en bas -->
  <text x="100" y="163" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="26" fill="white" letter-spacing="1">IBIG</text>
  <text x="100" y="185" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="18" fill="#80CBC4" letter-spacing="2">DocPro</text>
</svg>
